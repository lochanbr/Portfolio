<!DOCTYPE html>
<html lang="en" class="scroll-smooth scroll-pt-20">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lochan B R | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type='text/css' href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['Poppins', 'sans-serif'],
            },
            colors: {
              neon: {
                blue: '#00f3ff',
                purple: '#bc13fe',
                green: '#0aff99',
                pink: '#ff0080',
                orange: '#ff6b35',
              }
            },
            animation: {
              'glow': 'glow 2s ease-in-out infinite alternate',
              'float': 'float 6s ease-in-out infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'gradient-x': 'gradient-x 15s ease infinite',
              'gradient-y': 'gradient-y 15s ease infinite',
              'gradient-xy': 'gradient-xy 15s ease infinite',
            },
            keyframes: {
              glow: {
                '0%': { boxShadow: '0 0 20px rgba(0, 243, 255, 0.3)' },
                '100%': { boxShadow: '0 0 40px rgba(0, 243, 255, 0.6), 0 0 80px rgba(0, 243, 255, 0.3)' }
              },
              float: {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-20px)' }
              },
              'gradient-x': {
                '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                '50%': { 'background-size': '200% 200%', 'background-position': 'right center' }
              },
              'gradient-y': {
                '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'center top' },
                '50%': { 'background-size': '200% 200%', 'background-position': 'center bottom' }
              },
              'gradient-xy': {
                '0%, 100%': { 'background-size': '400% 400%', 'background-position': 'left center' },
                '50%': { 'background-size': '400% 400%', 'background-position': 'right center' }
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        background-attachment: fixed;
        color: #e2e8f0;
        overflow-x: hidden;
      }

      /* Animated Background Particles */
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image:
          radial-gradient(circle at 20% 80%, rgba(0, 243, 255, 0.1) 0%, transparent 50%),
          radial-gradient(circle at 80% 20%, rgba(188, 19, 254, 0.1) 0%, transparent 50%),
          radial-gradient(circle at 40% 40%, rgba(10, 255, 153, 0.1) 0%, transparent 50%);
        animation: gradient-xy 20s ease infinite;
        z-index: -2;
        pointer-events: none;
      }

      /* Floating Orbs */
      .floating-orb {
        position: absolute;
        border-radius: 50%;
        animation: float 8s ease-in-out infinite;
        opacity: 0.6;
        filter: blur(1px);
      }

      .orb-1 {
        top: 10%;
        left: 10%;
        width: 60px;
        height: 60px;
        background: linear-gradient(45deg, #00f3ff, #bc13fe);
        animation-delay: 0s;
      }

      .orb-2 {
        top: 60%;
        right: 15%;
        width: 40px;
        height: 40px;
        background: linear-gradient(45deg, #0aff99, #ff0080);
        animation-delay: 2s;
      }

      .orb-3 {
        bottom: 20%;
        left: 20%;
        width: 80px;
        height: 80px;
        background: linear-gradient(45deg, #ff6b35, #00f3ff);
        animation-delay: 4s;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: linear-gradient(180deg, #1e293b 0%, #334155 100%);
      }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #00f3ff 0%, #bc13fe 100%);
        border-radius: 4px;
        box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, #bc13fe 0%, #0aff99 100%);
        box-shadow: 0 0 15px rgba(188, 19, 254, 0.5);
      }

      /* Text Glow Effects */
      .text-glow {
        text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor;
      }

      .text-glow-blue {
        text-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff, 0 0 30px #00f3ff;
      }

      .text-glow-purple {
        text-shadow: 0 0 10px #bc13fe, 0 0 20px #bc13fe, 0 0 30px #bc13fe;
      }

      /* Gradient Text */
      .gradient-text {
        background: linear-gradient(45deg, #00f3ff, #bc13fe, #0aff99);
        background-size: 200% 200%;
        animation: gradient-x 3s ease infinite;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Neon Border */
      .neon-border {
        position: relative;
        border: 2px solid transparent;
        background: linear-gradient(45deg, #00f3ff, #bc13fe) border-box;
        border-radius: 8px;
      }

      .neon-border::before {
        content: '';
        position: absolute;
        top: -2px;
        left: -2px;
        right: -2px;
        bottom: -2px;
        background: linear-gradient(45deg, #00f3ff, #bc13fe);
        border-radius: 8px;
        z-index: -1;
        animation: glow 2s ease-in-out infinite alternate;
      }

      /* Hover Effects */
      .hover-lift {
        transition: all 0.3s ease;
      }

      .hover-lift:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0, 243, 255, 0.2);
      }

      /* Glass Morphism */
      .glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* Pulse Animation */
      @keyframes pulse-glow {
        0%, 100% {
          box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }
        50% {
          box-shadow: 0 0 40px rgba(0, 243, 255, 0.6), 0 0 60px rgba(0, 243, 255, 0.3);
        }
      }

      .pulse-glow {
        animation: pulse-glow 3s ease-in-out infinite;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "framer-motion": "https://esm.sh/framer-motion@^12.23.26",
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "react-type-animation": "https://esm.sh/react-type-animation@3.2.0?external=react,react-dom"
  }
}
</script>

</html>
